name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Full self-contained suite on both supported platforms: generator unit
  # tests, cross-language wire conformance (C == Rust == TS), and the framing +
  # runtime crate tests, then the example round-trip script.
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            framing
            runtime
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      # No global TypeScript install: the conformance harness and verify.sh run
      # a pinned `npx -p typescript@5.9 tsc` (TS 6.0 removed the flags this leg
      # relies on), so the compiler is deterministic and independent of the host.
      - name: Install libudev (serialport build dependency on Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config
      - name: Install Python test deps (pyyaml, jinja2, pytest)
        run: make setup
      - name: Run full test suite (hard-require C + Rust + TypeScript)
        # PROTOEMB_CONFORMANCE_REQUIRE_ALL fails if any language leg is missing
        # or empty — local `make test` still soft-skips absent toolchains.
        run: make test-ci
      - name: Example round-trip (examples/verify.sh)
        run: make verify

  # The runtime crate must keep compiling to WebAssembly (the browser
  # WasmClient path).
  wasm:
    name: wasm build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: runtime
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: wasm-pack build (runtime, web target)
        run: wasm-pack build runtime --target web --release --out-dir /tmp/protoemb-wasm-pkg

  # Generator determinism: the same schema + templates must produce
  # byte-identical output on every run (consumers regenerate at build time).
  determinism:
    name: codegen determinism
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install codegen deps
        run: pip install -r core/requirements.txt
      - name: Generate the example twice per target and diff
        run: |
          set -euo pipefail
          gen() {
            python3 core/generate.py \
              --schema examples/thermostat.yaml \
              --templates core/templates \
              --target "$1" --output "$2"
          }
          for pass in a b; do
            gen c  "/tmp/gen-$pass/c"
            gen ts "/tmp/gen-$pass/ts"
            gen rs "/tmp/gen-$pass/rs"
          done
          if ! diff -r /tmp/gen-a /tmp/gen-b; then
            echo "::error::Code generation is non-deterministic (two runs differ)."
            exit 1
          fi
          echo "Codegen is byte-reproducible."

  # Python lint (config in ruff.toml).
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run ruff
        run: pipx run ruff==0.14.11 check --output-format=github core tests

  # Rust lint gate: clippy must be warning-free (-D warnings) on both path
  # crates. protoemb is not a workspace, so each crate is linted via its own
  # manifest. The runtime crate is linted for both native (serial + stdio
  # bridge) and the browser wasm target. The wasm leg uses --lib only: that is
  # exactly what wasm-pack compiles, and --all-targets can't apply there because
  # the native-only protoemb-bridge bin is cfg'd out of the wasm build.
  clippy:
    name: clippy (-D warnings)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            framing
            runtime
      - name: Install libudev (serialport build dependency on Linux)
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config
      - name: clippy framing (native)
        run: cargo clippy --manifest-path framing/Cargo.toml --all-targets -- -D warnings
      - name: clippy runtime (native)
        run: cargo clippy --manifest-path runtime/Cargo.toml --all-targets -- -D warnings
      - name: clippy runtime (wasm32)
        run: cargo clippy --manifest-path runtime/Cargo.toml --target wasm32-unknown-unknown --lib -- -D warnings

  # MSRV gate: both crates must build on the pinned rust-version (1.78). The
  # floor is the committed Cargo.lock v4 format; see rust-version in each
  # crate's Cargo.toml. Build only (matches the crates' contract).
  msrv:
    name: msrv (1.78)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.78.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            framing
            runtime
      - name: Install libudev (serialport build dependency on Linux)
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config
      - name: build framing on MSRV
        run: cargo build --manifest-path framing/Cargo.toml
      - name: build runtime on MSRV
        run: cargo build --manifest-path runtime/Cargo.toml

  # Supply-chain gate. cargo-deny (advisories + licenses + bans + sources) runs
  # per crate against the shared deny.toml at the repo root — protoemb is not a
  # workspace, so the action is invoked once per manifest. pip-audit checks the
  # code generator's Python dependencies for known CVEs.
  supply-chain:
    name: supply-chain (cargo-deny + pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: cargo-deny (framing)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: framing/Cargo.toml
      - name: cargo-deny (runtime)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: runtime/Cargo.toml
      - name: pip-audit (code generator deps)
        run: pipx run pip-audit -r core/requirements.txt
