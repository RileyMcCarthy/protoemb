version: 2
updates:
  # Host runtime crate (also the wasm client + bridge binary).
  - package-ecosystem: cargo
    directory: /runtime
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Wire framing crate (zero runtime deps; covers dev-deps if any appear).
  - package-ecosystem: cargo
    directory: /framing
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Code generator (pyyaml + jinja2).
  - package-ecosystem: pip
    directory: /core
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # GitHub Actions used by CI.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
